server {
    listen 80;
    
    # เสิร์ฟไฟล์ Static ของเว็บ
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # เพิ่มส่วนนี้: สั่งให้ Nginx ส่งต่อ API Request ไปหา Backend
    location /api {
        # 'backend' คือชื่อ Service ที่เราตั้งไว้ใน docker-compose.yml
        proxy_pass http://backend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}