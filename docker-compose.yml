services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - data:/var/lib/postgresql/data

  app:
    build: 
      context: .              # เปลี่ยน context เป็นที่ Root (.)
      dockerfile: Dockerfile   # ใช้ Dockerfile ที่รวมร่างไว้ที่ Root
    
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./Backend/.env        # ใช้ไฟล์ .env เดิมของ Backend
    environment:
      DATABASE_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@db:5432/${DB_DATABASE}"

volumes:
  data:
    driver: local